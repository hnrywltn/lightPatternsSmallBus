<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Light Patterns — QR Sticker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #08080f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 40px 20px 60px;
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      gap: 28px;
      color: white;
    }
    header { text-align: center; }
    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #e9d5ff;
      letter-spacing: 0.5px;
    }
    p.sub {
      font-size: 13px;
      color: rgba(255,255,255,0.38);
      margin-top: 6px;
      letter-spacing: 0.3px;
    }
    #sticker-wrap {
      filter: drop-shadow(0 0 36px rgba(124,58,237,0.45));
    }
    .controls { display: flex; gap: 12px; }
    .btn {
      padding: 11px 26px;
      background: #7c3aed;
      border: none;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.3px;
      transition: all 0.18s;
      box-shadow: 0 4px 18px rgba(124,58,237,0.38);
    }
    .btn:hover { background: #6d28d9; transform: translateY(-1px); }
    .btn-ghost {
      background: transparent;
      border: 1.5px solid rgba(168,85,247,0.45);
      color: #c084fc;
      box-shadow: none;
    }
    .btn-ghost:hover { background: rgba(124,58,237,0.14); border-color: #a855f7; }
    .note {
      font-size: 12px;
      color: rgba(255,255,255,0.28);
      text-align: center;
      max-width: 380px;
      line-height: 1.65;
    }
  </style>
</head>
<body>

<header>
  <h1>Light Patterns — QR Sticker</h1>
  <p class="sub">lightpatternsonline.com/#contact</p>
</header>

<div id="sticker-wrap"></div>

<div class="controls">
  <button class="btn" onclick="downloadSVG()">Download SVG</button>
  <button class="btn btn-ghost" onclick="window.print()">Print</button>
</div>

<p class="note">
  SVG is vector — send to any print shop at any size.<br>
  For die-cut stickers, ask them to cut along the outer light bulb edge.
</p>

<script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
<script>
// ─── QR Generation ────────────────────────────────────────────────────────────
const qr = qrcode(0, 'M');
qr.addData('https://lightpatternsonline.com/#contact');
qr.make();
const N = qr.getModuleCount(); // 33 for this URL at M correction

// ─── Canvas & Bulb Dimensions ─────────────────────────────────────────────────
const W = 500, H = 710;
const cx = 250;

const bcy = 220;    // bulb centre y
const br  = 188;    // bulb radius

// QR must fit inside circle: half-diagonal = (qrSz/2)√2 ≤ br
// Use 242px → half-diagonal ≈ 170.8 < 188 ✓
const qrSz = 242;
const ms   = qrSz / N;          // module size ≈ 7.33 px
const qrL  = cx - qrSz / 2;     // QR left x
const qrT  = bcy - qrSz / 2;    // QR top  y
const qrB  = qrT + qrSz;        // QR bottom y = 342

// Neck + base coords
// Circle bottom: bcy + br = 408
// At y=385 (inside circle): x-offset = √(188²−165²) = √(35344−27225) = √8119 ≈ 90 → use 80
const nx0 = 80,  ny0 = 385;    // neck start (inside glass)
const nx1 = 60,  ny1 = 415;    // waist
const bx  = 72,  by0 = 425;    // base top
const by1 = 590;                // base bottom

// ─── QR Module Rendering ─────────────────────────────────────────────────────
function renderQR() {
  const r = ms * 0.13;
  let s = '';
  for (let row = 0; row < N; row++) {
    for (let col = 0; col < N; col++) {
      if (qr.isDark(row, col)) {
        const x  = (qrL + col * ms).toFixed(2);
        const y  = (qrT + row * ms).toFixed(2);
        const sz = ms.toFixed(2);
        s += `<rect x="${x}" y="${y}" width="${sz}" height="${sz}" rx="${r.toFixed(2)}"/>`;
      }
    }
  }
  return s;
}

// ─── Screw Thread Lines ───────────────────────────────────────────────────────
function renderThreads() {
  const x0 = cx - bx + 5, x1 = cx + bx - 5;
  const yStart = by0 + 24;
  const count  = 5;
  const gap    = 24;
  let s = '';
  for (let i = 0; i < count; i++) {
    const y  = yStart + i * gap;
    const op = (0.55 - i * 0.06).toFixed(2);
    s += `<line x1="${x0}" y1="${y}" x2="${x1}" y2="${y}" stroke="#6060a0" stroke-width="1.5" stroke-linecap="round" opacity="${op}"/>`;
    // Subtle mid-shadow line
    const ys = y + 6;
    s += `<line x1="${x0+4}" y1="${ys}" x2="${x1-4}" y2="${ys}" stroke="#3a3a70" stroke-width="0.8" opacity="${(Number(op)*0.5).toFixed(2)}"/>`;
  }
  return s;
}

// ─── Filament (decorative, below QR inside glass) ─────────────────────────────
const fy = qrB + 16;   // filament top y
const filament = `
  <!-- support wires -->
  <line x1="${cx-26}" y1="${fy}"    x2="${cx-26}" y2="${fy+24}" stroke="#c084fc" stroke-width="1.8" opacity="0.55" stroke-linecap="round"/>
  <line x1="${cx+26}" y1="${fy}"    x2="${cx+26}" y2="${fy+24}" stroke="#c084fc" stroke-width="1.8" opacity="0.55" stroke-linecap="round"/>
  <!-- filament coil -->
  <path d="M ${cx-26} ${fy+24}
           C ${cx-14} ${fy+10}, ${cx-6} ${fy+38}, ${cx}   ${fy+24}
           C ${cx+6}  ${fy+10}, ${cx+14} ${fy+38}, ${cx+26} ${fy+24}"
        stroke="#d8b4fe" stroke-width="1.8" fill="none" opacity="0.6" stroke-linecap="round"/>
`;

// ─── Neck / Base Path ─────────────────────────────────────────────────────────
const neckPath = `
  M ${cx-nx0} ${ny0}
  Q ${cx-nx1-4} ${ny1-4}, ${cx-nx1} ${ny1}
  Q ${cx-bx+2}  ${by0-4},  ${cx-bx}  ${by0}
  L ${cx-bx} ${by1}
  L ${cx+bx} ${by1}
  L ${cx+bx} ${by0}
  Q ${cx+bx-2}  ${by0-4},  ${cx+nx1} ${ny1}
  Q ${cx+nx1+4} ${ny1-4}, ${cx+nx0} ${ny0}
  Z
`;

// ─── Assemble SVG ─────────────────────────────────────────────────────────────
const svg = `<svg xmlns="http://www.w3.org/2000/svg"
    id="qr-bulb-svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
  <defs>

    <!-- Outer glow blur -->
    <filter id="outerGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft bloom inside bulb -->
    <filter id="bloom" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Bulb glass fill: white core → soft lavender edge -->
    <radialGradient id="bulbFill" cx="37%" cy="26%" r="74%" fx="37%" fy="26%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="30%"  stop-color="#f8f0ff"/>
      <stop offset="65%"  stop-color="#ede0ff"/>
      <stop offset="100%" stop-color="#d6c0fc"/>
    </radialGradient>

    <!-- Outer purple ambient -->
    <radialGradient id="ambientGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.32"/>
      <stop offset="65%"  stop-color="#7c3aed" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- Metal base: deep blue-purple gradient -->
    <linearGradient id="baseFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0e0e20"/>
      <stop offset="22%"  stop-color="#1e1e40"/>
      <stop offset="50%"  stop-color="#2c2c58"/>
      <stop offset="78%"  stop-color="#1e1e40"/>
      <stop offset="100%" stop-color="#0e0e20"/>
    </linearGradient>

    <!-- Collar highlight band -->
    <linearGradient id="collarFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#18183a"/>
      <stop offset="30%"  stop-color="#52528a"/>
      <stop offset="50%"  stop-color="#6868a8"/>
      <stop offset="70%"  stop-color="#52528a"/>
      <stop offset="100%" stop-color="#18183a"/>
    </linearGradient>

    <!-- Contact pad at base bottom -->
    <linearGradient id="contactFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#16163a"/>
      <stop offset="50%"  stop-color="#303060"/>
      <stop offset="100%" stop-color="#16163a"/>
    </linearGradient>

  </defs>

  <!-- ── Sticker background ── -->
  <rect width="${W}" height="${H}" rx="28" fill="#05050a"/>

  <!-- ── Purple ambient glow ── -->
  <circle cx="${cx}" cy="${bcy}" r="${br+60}" fill="url(#ambientGrad)" filter="url(#outerGlow)"/>

  <!-- ── Neck + screw base (drawn first, glass overlaps top) ── -->
  <path d="${neckPath}" fill="url(#baseFill)"/>

  <!-- collar highlight -->
  <rect x="${cx-bx}" y="${by0}" width="${bx*2}" height="16" rx="3" fill="url(#collarFill)"/>

  <!-- screw threads -->
  ${renderThreads()}

  <!-- contact pad -->
  <rect x="${cx-30}" y="${by1-10}" width="60" height="16" rx="6" fill="url(#contactFill)"/>
  <rect x="${cx-20}" y="${by1-4}"  width="40" height="9"  rx="4" fill="#2c2c58"/>

  <!-- ── Glass bulb ── -->
  <circle cx="${cx}" cy="${bcy}" r="${br}" fill="url(#bulbFill)"/>

  <!-- subtle inner bloom centre -->
  <circle cx="${cx}" cy="${bcy-8}" r="88" fill="white" opacity="0.07" filter="url(#bloom)"/>

  <!-- ── QR code ── -->
  <g fill="#2d0060">
    ${renderQR()}
  </g>

  <!-- ── Filament below QR ── -->
  ${filament}

  <!-- ── Glass specular highlights ── -->
  <!-- main highlight (upper-left) -->
  <ellipse cx="${cx-64}" cy="${bcy-76}" rx="44" ry="30"
           fill="white" opacity="0.30"
           transform="rotate(-24 ${cx-64} ${bcy-76})"/>
  <!-- small secondary highlight -->
  <ellipse cx="${cx+60}" cy="${bcy-104}" rx="18" ry="11"
           fill="white" opacity="0.14"
           transform="rotate(18 ${cx+60} ${bcy-104})"/>

  <!-- ── Bulb border ring ── -->
  <circle cx="${cx}" cy="${bcy}" r="${br}" fill="none"
          stroke="#a855f7" stroke-width="2.2" opacity="0.60"/>

  <!-- ── Brand text ── -->
  <text x="${cx}" y="${H-44}" text-anchor="middle"
        fill="#c084fc" font-size="17.5"
        font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif"
        font-weight="500" letter-spacing="3.5">LIGHT PATTERNS</text>
  <text x="${cx}" y="${H-18}" text-anchor="middle"
        fill="rgba(255,255,255,0.32)" font-size="11"
        font-family="'Helvetica Neue',Arial,sans-serif"
        letter-spacing="1.8">lightpatternsonline.com</text>

</svg>`;

document.getElementById('sticker-wrap').innerHTML = svg;

// ─── Download SVG ─────────────────────────────────────────────────────────────
function downloadSVG() {
  const el  = document.getElementById('qr-bulb-svg');
  const str = new XMLSerializer().serializeToString(el);
  const blob = new Blob([str], { type: 'image/svg+xml;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'lightpatterns-qr-sticker.svg';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
